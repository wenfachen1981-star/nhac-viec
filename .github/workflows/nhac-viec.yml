name: Nhac viec

on:
  schedule:
    # 01:00 UTC = 08:00 gio Viet Nam (VN = UTC+7). Doi gio thi sua so dau tien.
    - cron: '0 1 * * *'
  workflow_dispatch:   # cho phep bam chay tay de test

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build message and send to Telegram
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          NGAY=$(TZ=Asia/Ho_Chi_Minh date '+%d/%m/%Y')
          MSG=$(printf '📋 Nhắc việc hôm nay (%s):' "$NGAY")
          FOUND=0
          while IFS= read -r line || [ -n "$line" ]; do
            case "$line" in
              \#*) ;;                                  # dong ghi chu -> bo qua
              '[ ]'*) t="${line#\[ \]}"; MSG="$MSG"$'\n'"• ${t# }"; FOUND=1 ;;
            esac
          done < viec-can-lam.txt
          if [ "$FOUND" = "0" ]; then
            MSG="$MSG"$'\n'"(Hom nay khong co viec nao trong danh sach)"
          fi
          curl -s "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT}" \
            --data-urlencode "text=${MSG}"
