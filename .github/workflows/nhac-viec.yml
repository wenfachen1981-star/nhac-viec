name: Nhac viec

on:
  schedule:
    # Moi 30 phut trong khung 07:00-22:30 gio VN (UTC = VN - 7 => UTC 0..15)
    - cron: '0,30 0-15 * * *'
  workflow_dispatch:

permissions:
  contents: write   # de commit lai trang thai viec + offset

concurrency:
  group: nhac-viec
  cancel-in-progress: false

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache deps & whisper model
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/huggingface
          key: nhacviec-cache-v1

      - name: Install base deps
        run: pip install --quiet requests

      - name: Run reminder
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/nhacviec.py

      - name: Commit updated state
        run: |
          git config user.name "nhacviec-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Khong co thay doi."
          else
            git commit -m "cap nhat trang thai viec [skip ci]"
            git push
          fi
